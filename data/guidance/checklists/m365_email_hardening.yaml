# Checklist: Microsoft 365 email account hardening.
id: m365_email_hardening
display_name: "Microsoft 365 email security basics"
topic: email_account_hardening
applies_to: m365
source_document_id: cisa-phishing

items:
  - id: strong_password
    short_title: "Use a strong, unique password"
    user_facing_text: "It's best to have a strong password that you don’t use for any other site or app. Consider a password manager to generate and store it. If you don't have a strong password, you can change it by going to account.microsoft.com, clicking Security, then Password security. Follow the prompts to change it."
    detail_explanation: "Reused or weak passwords are common causes of account compromise. Frame as: it's best to have a strong password; if not, here's how to change it."

  - id: mfa
    short_title: "Turn on MFA (multi-factor authentication)"
    user_facing_text: "Enable multi-factor authentication for your Microsoft account. In the Microsoft 365 admin center or account security settings, turn on MFA (e.g. Microsoft Authenticator app or another method). Prefer an authenticator app over SMS when possible."
    detail_explanation: "MFA greatly reduces the risk of someone logging in with a stolen password."

  - id: review_apps
    short_title: "Review connected apps and permissions"
    user_facing_text: "In your Microsoft account or Azure AD app consent settings (if you have admin access), review apps that have access to your mail or data. Remove any you don’t recognize or no longer use."
    detail_explanation: "Old or malicious connected apps can read or misuse your email."

  - id: avoid_sensitive_email
    short_title: "Avoid sending sensitive files or data via email when possible"
    user_facing_text: "OneDrive is a place online where you can store your files, like documents and photos. Instead of attaching a file to an email, you can put it in OneDrive and then choose exactly who can see or edit it. For sensitive or confidential files, use OneDrive or SharePoint sharing with specific people and appropriate permissions instead of attaching files to email. Email can be forwarded or compromised."
    detail_explanation: "Email is easy to forward or leak; secure sharing links are safer for sensitive data."

  - id: recognize_phishing
    short_title: "Know how to spot phishing"
    user_facing_text: "Be cautious of urgent or unexpected emails asking you to click a link, open a file, or enter your password. Check the sender address and, when in doubt, go to the service’s website directly instead of clicking links in the email."
    detail_explanation: "Phishing is a common way attackers steal passwords or install malware."

notes_for_model: "Use for Microsoft 365 users. Walk through items in order (password first, then MFA, review apps, OneDrive, phishing). For recognize_phishing (knowledge-only), ask 'Do you have any questions about phishing?' not 'Do you want help doing it?'"
