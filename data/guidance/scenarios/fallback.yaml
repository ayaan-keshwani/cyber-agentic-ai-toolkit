# Fallback when no specific playbook applies. Keeps recommendations within approved guidance.
id: fallback_no_specific_playbook
display_name: "No specific playbook for this situation"
category: general
trigger_signals: []
applies_to: ["us-based"]
severity_level: info
source_document_id: ftc-small-business

steps:
  - id: step_1
    short_title: "Contact your cyber insurance carrier"
    user_facing_text: "If you have cyber insurance, contact your carrier's breach or incident hotline. They can help you understand your coverage and recommend next steps or providers."
    detail_explanation: "Carriers are used to guiding businesses through unclear situations."
    timing: immediately
    requires_human_professional: true

  - id: step_2
    short_title: "Consider reporting to authorities"
    user_facing_text: "You can report cyber incidents to the FBI's Internet Crime Complaint Center (IC3) at ic3.gov and to CISA at report@cisa.dhs.gov. They can provide guidance and track trends."
    detail_explanation: "Reporting helps you get on the radar of agencies that may have resources or guidance."
    timing: within_24_hours
    requires_human_professional: false

  - id: step_3
    short_title: "Engage IT or incident response help"
    user_facing_text: "If you have an IT provider or can engage a qualified incident response or cybersecurity firm, they can help assess what happened and what to do next. Your insurer may have a preferred list."
    detail_explanation: "Complex incidents usually require professional assessment and containment."
    timing: within_24_hours
    requires_human_professional: true

notes_for_model: "Use ONLY when the user's situation does not match any playbook AND they have given enough detail (not vague). For vague descriptions (e.g., 'something wrong with my email,' 'email problem,' 'having issues')—do NOT use this fallback. Ask for clarification first (weird email? unusual login? password notification?). When you do use fallback: Do not quote their words. Say something like 'I'm not too sure how to help with that, but here's what I'd suggest for now:' then give the filtered steps. CRITICAL—Filter steps strictly: step_1 (insurer): ONLY if has_cyber_insurance is true AND the situation is clearly serious (wire fraud, ransomware, breach). step_2 (FBI/IC3): ONLY for clearly serious incidents (wire fraud, ransomware)—NEVER for suspicious/weird email, vague problems, or 'something wrong.' The default for unclear situations is to ask for clarification, not to recommend FBI or insurance. step_3 (IT/IR): Only if it_support is not 'none'. For suspicious or weird email only: suggest reporting to the email provider (Report phishing) and deleting—never FBI/IC3."
